# Easyfest — Supabase project config
# https://supabase.com/docs/guides/cli/config

project_id = "easyfest"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp"]

[storage.buckets.parental-authorizations]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png"]

[storage.buckets.event-media]
public = true
file_size_limit = "20MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "video/mp4"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://easyfest.app/auth/callback",
  "https://easyfest.app/v",
  "https://easyfest.app/r",
  "https://easyfest.app/staff",
  "https://easyfest.app/regie",
  "https://easyfest.app/admin"
]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true

[auth.email.template.confirmation]
subject = "Confirmation de votre inscription Easyfest"

[auth.email.template.magic_link]
subject = "Ton lien de connexion Easyfest"

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.external.google]
enabled = false

[edge_runtime]
enabled = true
inspector_port = 8083
