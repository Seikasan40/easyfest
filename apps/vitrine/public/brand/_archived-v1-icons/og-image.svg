      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFE8DA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#ogbg)"/>
  <!-- Logo F -->
  <rect x="80" y="80" width="120" height="120" rx="28" fill="#FF5E5B"/>
  <path d="M 116 110 L 116 178 M 116 120 L 168 120 M 116 142 L 156 142" stroke="#FFF8F0" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="168" cy="160" r="7" fill="#FFF8F0"/>
  <!-- Wordmark + accroche -->
